apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    {{- include "idmas.labels" . | nindent 4 }}
    app: idmas-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels: {app: idmas-worker}
  template:
    metadata:
      labels: {app: idmas-worker}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.worker.metricsPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: worker
          image: {{ .Values.image.worker }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - {name: metrics, containerPort: {{ .Values.worker.metricsPort }}}
          envFrom:
            {{- include "idmas.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- if .Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-worker
  minReplicas: {{ .Values.worker.replicas }}
  maxReplicas: {{ .Values.autoscaling.workerMax }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 75}
{{- end }}
