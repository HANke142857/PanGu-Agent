# 非敏感配置（后端开关 + 服务地址）。
# 中间件（postgres/redis/rabbitmq/minio/es/neo4j/milvus）假定已在 namespace 内
# 由 Helm（如 Bitnami charts）或托管服务提供，service 名如下。
apiVersion: v1
kind: ConfigMap
metadata:
  name: idmas-config
  namespace: idmas
data:
  APP_ENV: "production"
  APP_LOG_LEVEL: "INFO"
  DB_BACKEND: "sql"
  MQ_BACKEND: "rabbitmq"
  STORAGE_BACKEND: "minio"
  VECTOR_BACKEND: "milvus"
  SEARCH_BACKEND: "es"
  GRAPH_BACKEND: "neo4j"
  CACHE_BACKEND: "redis"
  LLM_BACKEND: "vllm"
  OCR_BACKEND: "fake"
  PLM_BACKEND: "fake"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9100"
  REDIS_URL: "redis://redis:6379/0"
  RABBITMQ_URL: "amqp://idmas:idmas_pwd@rabbitmq:5672/"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "idmas-drawings"
  MILVUS_HOST: "milvus"
  MILVUS_PORT: "19530"
  ES_URL: "http://elasticsearch:9200"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  VLLM_URL: "http://vllm:8000"
