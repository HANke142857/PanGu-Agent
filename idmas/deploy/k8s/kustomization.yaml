# 一键应用：kubectl apply -k deploy/k8s
# 中间件（postgres/redis/rabbitmq/minio/es/neo4j/milvus）请另行用 Helm 或托管服务提供，
# service 名需与 configmap.yaml 一致。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: idmas

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - api-deployment.yaml
  - worker-deployment.yaml
  - vllm-statefulset.yaml
  - hpa.yaml
  - ingress.yaml
