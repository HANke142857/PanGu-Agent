# 自动扩缩（CPU 维度）。worker 按"队列积压 > 20"扩容需 KEDA/自定义指标，
# 这里给出 CPU 基线 HPA，生产可叠加 KEDA ScaledObject（RabbitMQ queueLength）。
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: idmas-api
  namespace: idmas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: idmas-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 70}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: idmas-worker
  namespace: idmas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: idmas-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 75}
