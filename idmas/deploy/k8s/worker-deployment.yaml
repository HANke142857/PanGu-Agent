# LangGraph Worker Deployment（消费 task.created；扩容触发：队列积压 > 20，见 hpa.yaml）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idmas-worker
  namespace: idmas
  labels: {app: idmas-worker}
spec:
  replicas: 2
  selector:
    matchLabels: {app: idmas-worker}
  template:
    metadata:
      labels: {app: idmas-worker}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: worker
          image: idmas-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {name: metrics, containerPort: 9100}
          envFrom:
            - configMapRef: {name: idmas-config}
            - secretRef: {name: idmas-secrets}
          resources:
            requests: {cpu: "1", memory: 4Gi}
            limits: {cpu: "4", memory: 8Gi}
